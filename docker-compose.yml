# ponytail: dev compose, no Dockerfiles — node image + command. Add multi-stage
# Dockerfiles when you need a production build/image.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: patients
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro  # runs on first init
      - pgdata:/var/lib/postgresql/data

  backend:
    image: node:22
    working_dir: /app
    command: sh -c "npm install && npm run start:dev"
    environment:
      PGHOST: db          # node-postgres reads these PG* vars automatically
      PGUSER: app
      PGPASSWORD: app
      PGDATABASE: patients
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules   # keep container's linux node_modules, not host's
    ports:
      - "3000:3000"

  frontend:
    image: node:22
    working_dir: /app
    command: sh -c "npm install && npm start -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4200:4200"

volumes:
  pgdata:
